<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!-- GitHub Pages serves this file for any path that isn't the literal
         site root (it has no server-side rewrites for a single-page app).
         This app's own routing lives entirely in src/main.js and only
         understands a fixed handful of tab routes; any other path — typos,
         stale bookmarks, deep links to routes that no longer exist — should
         just land on the default tab. Base path below must match
         vite.config.js's `base` (this file is copied as-is, not processed
         by Vite, so it can't read that value at build time). -->
    <script>
      location.replace('/cca-exam-prep/random');
    </script>
  </head>
  <body></body>
</html>
