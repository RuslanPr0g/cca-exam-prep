<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!-- GitHub Pages serves this file for any path that isn't a real file on
         disk (it has no server-side rewrites) — including every one of this
         app's pretty tab routes (/regular, /random, ...), since only the site
         root actually exists as index.html. Redirecting straight back to the
         same pretty path (what this file used to do) just 404s again —
         infinite loop. Instead, redirect to the real root with the intended
         route packed into a query string; src/main.js reads `?route=` back
         out and replaceState()s the pretty URL back in once the real app has
         loaded (see currentRoute() in src/main.js). Base path below must
         match vite.config.js's `base` (this file is copied as-is, not
         processed by Vite, so it can't read that value at build time). -->
    <script>
      var base = '/cca-exam-prep/';
      var route = location.pathname.slice(base.length);
      location.replace(base + '?route=' + encodeURIComponent(route));
    </script>
  </head>
  <body></body>
</html>
